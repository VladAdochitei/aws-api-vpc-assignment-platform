{% extends "base.html" %}

{% block title %}Edit Subnet{% endblock %}

{% block content %}
<h1>Edit Subnet: {{ subnet.subnet_name }}</h1>

<form method="POST">
    <div class="form-group">
        <label>Subnet ID (read-only)</label>
        <input type="text" value="{{ subnet.subnet_id }}" disabled>
    </div>

    <div class="form-group">
        <label>VPC ID (read-only)</label>
        <input type="text" value="{{ subnet.vpc_id }}" disabled>
    </div>

    <div class="form-group">
        <label>CIDR Block (read-only)</label>
        <input type="text" value="{{ subnet.cidr_block }}" disabled>
    </div>

    <div class="form-group">
        <label>Availability Zone (read-only)</label>
        <input type="text" value="{{ subnet.availability_zone or 'N/A' }}" disabled>
    </div>

    <div class="form-group">
        <label for="subnet_name">Subnet Name</label>
        <input type="text" id="subnet_name" name="subnet_name" value="{{ subnet.subnet_name }}">
    </div>

    <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="">-- No change --</option>
            <option value="active" {% if subnet.status == 'active' %}selected{% endif %}>Active</option>
            <option value="deleted" {% if subnet.status == 'deleted' %}selected{% endif %}>Deleted</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="/subnets/{{ subnet.subnet_id }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
